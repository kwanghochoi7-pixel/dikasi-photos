<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIKASI — Photo Poetry by Kwang-ho Choi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+KR:wght@300;400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1714;--paper:#f7f4ef;--paper2:#ece8df;
  --gold:#b8956a;--muted:#8a8070;
  --serif-en:'Cormorant Garamond',Georgia,serif;
  --serif-kr:'Noto Serif KR','Malgun Gothic',serif;
  --sans:'Outfit',sans-serif;
}
html,body{min-height:100vh;background:var(--paper);font-family:var(--sans);color:var(--ink);}
.shell{max-width:460px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:2rem;}

.hdr{padding:1.75rem 1.5rem 0.5rem;display:flex;justify-content:space-between;align-items:flex-end;}
.hdr h1{font-family:var(--serif-en);font-size:2rem;font-weight:300;letter-spacing:6px;line-height:1;}
.hdr .sub{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-top:5px;}
.hdr-right{font-size:11px;color:var(--muted);text-align:right;}
.hdr-right strong{display:block;font-size:1.8rem;font-family:var(--serif-en);font-weight:300;color:var(--ink);line-height:1;}

.themes{display:flex;gap:6px;padding:.75rem 1.5rem .5rem;overflow-x:auto;scrollbar-width:none;}
.themes::-webkit-scrollbar{display:none;}
.t-btn{padding:5px 14px;border-radius:999px;border:1px solid var(--paper2);background:transparent;color:var(--muted);font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:.5px;cursor:pointer;white-space:nowrap;transition:all .18s;}
.t-btn:hover{border-color:var(--gold);color:var(--gold);}
.t-btn.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}

.card-area{padding:.5rem 1.5rem 0;}
.flip-scene{width:100%;height:540px;perspective:1200px;cursor:pointer;}
.flip-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .7s cubic-bezier(.4,.2,.2,1);}
.flip-card.flipped{transform:rotateY(180deg);}
.face{position:absolute;inset:0;border-radius:20px;overflow:hidden;backface-visibility:hidden;-webkit-backface-visibility:hidden;}

.front{background:#fff;box-shadow:0 4px 30px rgba(26,23,20,.1);display:flex;flex-direction:column;}
.photo-zone{position:relative;height:270px;background:var(--paper2);overflow:hidden;flex-shrink:0;}
.photo-zone img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .6s;}
.photo-zone img.show{opacity:1;}
.photo-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(20,17,14,.6) 100%);}
.photo-tag{position:absolute;top:14px;left:14px;font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.9);background:rgba(20,17,14,.45);backdrop-filter:blur(8px);padding:4px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.15);}
.flip-hint{position:absolute;bottom:12px;right:14px;font-size:10px;color:rgba(255,255,255,.55);letter-spacing:1px;}
.photo-credit{position:absolute;bottom:12px;left:14px;font-size:10px;color:rgba(255,255,255,.5);font-style:italic;}

.poem-en{padding:1.5rem 1.75rem 1rem;flex:1;display:flex;flex-direction:column;justify-content:center;}
.poem-en-text{font-family:var(--serif-en);font-size:1.3rem;line-height:1.9;font-weight:300;font-style:italic;color:var(--ink);white-space:pre-line;opacity:0;transform:translateY(6px);transition:opacity .6s,transform .6s;}
.poem-en-text.show{opacity:1;transform:none;}
.front-footer{padding:.6rem 1.75rem .9rem;border-top:1px solid var(--paper2);display:flex;justify-content:space-between;align-items:center;}
.sub-label{font-size:11px;color:var(--gold);letter-spacing:1px;}
.poem-num{font-size:11px;color:var(--muted);}
.poem-num span{color:var(--ink);font-weight:500;}

.back{background:var(--ink);transform:rotateY(180deg);display:flex;flex-direction:column;padding:1.75rem 2rem 1.5rem;}
.back-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
.back-title{font-family:var(--serif-en);font-size:1rem;font-weight:300;letter-spacing:4px;color:rgba(247,244,239,.4);}
.flip-hint-back{font-size:10px;color:rgba(247,244,239,.28);letter-spacing:1px;}
.back-theme{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem;}
.back-sub{font-family:var(--serif-kr);font-size:12px;color:rgba(247,244,239,.4);margin-bottom:1.5rem;font-weight:300;}
.poem-kr{font-family:var(--serif-kr);font-size:1.15rem;line-height:2.3;font-weight:300;color:var(--paper);white-space:pre-line;flex:1;display:flex;flex-direction:column;justify-content:center;opacity:0;transition:opacity .6s;}
.poem-kr.show{opacity:1;}
.back-footer{margin-top:1.25rem;padding-top:.9rem;border-top:1px solid rgba(247,244,239,.1);display:flex;justify-content:space-between;align-items:center;}
.heart-btn{background:none;border:none;cursor:pointer;font-size:22px;color:rgba(247,244,239,.2);transition:all .2s;padding:0;line-height:1;}
.heart-btn:hover{color:#e85a71;transform:scale(1.2);}
.heart-btn.loved{color:#e85a71;}
.back-note{font-family:var(--serif-kr);font-size:11px;color:rgba(247,244,239,.3);}

.nav-row{display:flex;gap:8px;padding:.9rem 1.5rem 0;align-items:center;}
.btn-nav{width:44px;height:44px;border-radius:12px;border:1px solid var(--paper2);background:var(--paper);color:var(--ink);font-size:16px;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn-nav:hover:not(:disabled){background:#fff;border-color:var(--gold);color:var(--gold);}
.btn-nav:disabled{opacity:.25;cursor:not-allowed;}
.btn-next{flex:1;height:44px;border-radius:12px;border:none;background:var(--ink);color:var(--paper);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;letter-spacing:.3px;transition:all .2s;}
.btn-next:hover{background:#2e2a26;transform:translateY(-1px);}
.btn-next:active{transform:none;}
.btn-copy{width:44px;height:44px;border-radius:12px;border:1px solid var(--paper2);background:transparent;color:var(--muted);font-size:15px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn-copy:hover{border-color:var(--gold);color:var(--gold);}

.hist-bar{display:flex;justify-content:center;gap:6px;padding:.7rem 1.5rem 0;min-height:20px;}
.h-dot{width:6px;height:6px;border-radius:50%;background:var(--paper2);transition:all .25s;cursor:pointer;}
.h-dot.cur{background:var(--ink);width:18px;border-radius:3px;}
.h-dot.visited{background:var(--muted);}

.saved-section{margin:1rem 1.5rem 0;display:none;}
.saved-section.show{display:block;}
.saved-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.saved-item{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:6px;border:1px solid var(--paper2);}
.saved-item-theme{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-family:var(--sans);margin-bottom:4px;}
.saved-item-text{font-family:var(--serif-en);font-size:13px;font-style:italic;color:var(--ink);line-height:1.7;}

.watermark{text-align:center;padding:1.5rem 0 0;font-size:10px;color:var(--muted);letter-spacing:2px;font-family:var(--serif-en);}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--ink);color:var(--paper);padding:10px 22px;border-radius:999px;font-size:12px;font-weight:500;transition:transform .28s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="shell">
  <header class="hdr">
    <div><h1>DIKASI</h1><div class="sub">photo poetry · 디카시</div></div>
    <div class="hdr-right"><strong id="totalNum">5</strong>poems</div>
  </header>

  <div class="themes" id="themesBar"></div>

  <div class="card-area">
    <div class="flip-scene" onclick="flipCard()">
      <div class="flip-card" id="flipCard">
        <div class="face front">
          <div class="photo-zone">
            <img id="poemImg" alt="photo by Kwang-ho Choi"/>
            <div class="photo-overlay"></div>
            <div class="photo-tag" id="photoTag">—</div>
            <div class="photo-credit" id="photoCredit"></div>
            <div class="flip-hint">한글로 보기 ↺</div>
          </div>
          <div class="poem-en"><div class="poem-en-text" id="enText"></div></div>
          <div class="front-footer">
            <div class="sub-label" id="subLabel"></div>
            <div class="poem-num">No. <span id="poemNum">—</span></div>
          </div>
        </div>
        <div class="face back">
          <div class="back-header">
            <div class="back-title">DIKASI</div>
            <div class="flip-hint-back">영어로 보기 ↺</div>
          </div>
          <div class="back-theme" id="backTheme"></div>
          <div class="back-sub" id="backSub"></div>
          <div class="poem-kr" id="krText"></div>
          <div class="back-footer">
            <div class="back-note" id="backNote"></div>
            <button class="heart-btn" id="heartBtn" onclick="event.stopPropagation();toggleSave()">♡</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="hist-bar" id="histBar"></div>

  <div class="nav-row">
    <button class="btn-nav" id="btnPrev" onclick="goTo(curIdx-1)">←</button>
    <button class="btn-next" id="btnNext" onclick="goTo(curIdx+1)">✦ Next Poem</button>
    <button class="btn-copy" onclick="copyPoem()" title="복사">⎋</button>
  </div>

  <div class="saved-section" id="savedSection">
    <div class="saved-title">❤ Saved poems</div>
    <div id="savedList"></div>
  </div>
  <div class="watermark">Poetry & Photography © Kwang-ho Choi · All rights reserved</div>
</div>
<div class="toast" id="toast"></div>

    theme: "Courage", themeKr: "용기",
    sub: "In Full Bloom", subKr: "만개",
    en: "The world was dark around it.\nIt opened anyway.\n\nWhatever you are waiting for —\nyou are already enough to begin.",
    kr: "주위는 온통 어두웠다.\n그래도 피어났다.\n\n무엇을 기다리고 있든 —\n당신은 이미 시작하기에 충분하다.",
    credit: "© Kwang-ho Choi"
  },
];

const THEMES_ORDER = ["All","Hope","Wonder","Stillness","Growth","Courage"];
let activeTheme = "All";
let pool = [];       // indices in current filter
let curIdx = 0;      // position within pool
let saved = new Set();

// Build theme bar
const bar = document.getElementById("themesBar");
THEMES_ORDER.forEach(t=>{
  const b=document.createElement("button");
  b.className="t-btn"+(t==="All"?" on":"");
  b.textContent=t;
  b.onclick=()=>{
    document.querySelectorAll(".t-btn").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    activeTheme=t;
    buildPool();
    curIdx=0;
    render();
  };
  bar.appendChild(b);
});

function buildPool(){
  if(activeTheme==="All") pool = POEMS.map((_,i)=>i);
  else pool = POEMS.map((_,i)=>i).filter(i=>POEMS[i].theme===activeTheme);
  if(pool.length===0) pool = POEMS.map((_,i)=>i);
}

function render(){
  const p = POEMS[pool[curIdx]];
  // reset flip
  document.getElementById("flipCard").classList.remove("flipped");
  isFlipped=false;

  // photo
  const img=document.getElementById("poemImg");
  img.classList.remove("show");
  img.src=p.b64;
  img.onload=()=>img.classList.add("show");

  document.getElementById("photoTag").textContent=p.theme.toUpperCase();
  document.getElementById("photoCredit").textContent=p.credit;
  document.getElementById("subLabel").textContent=p.sub;

  // english
  const et=document.getElementById("enText");
  et.classList.remove("show");
  et.textContent=p.en;
  requestAnimationFrame(()=>requestAnimationFrame(()=>et.classList.add("show")));

  // korean (back)
  document.getElementById("backTheme").textContent=p.theme+" · "+p.themeKr;
  document.getElementById("backSub").textContent=p.sub+" / "+p.subKr;
  document.getElementById("krText").textContent=p.kr;

  // num
  document.getElementById("poemNum").textContent=(pool[curIdx]+1);
  document.getElementById("backNote").textContent="시 No."+(pool[curIdx]+1);

  // heart
  const hb=document.getElementById("heartBtn");
  const isSaved=saved.has(pool[curIdx]);
  hb.className="heart-btn"+(isSaved?" loved":"");
  hb.textContent=isSaved?"♥":"♡";

  // nav buttons
  document.getElementById("btnPrev").disabled=(curIdx<=0);
  document.getElementById("btnNext").textContent = (curIdx>=pool.length-1) ? "↻ From Start" : "✦ Next Poem";

  renderDots();
}

let isFlipped=false;
function flipCard(){
  isFlipped=!isFlipped;
  document.getElementById("flipCard").classList.toggle("flipped",isFlipped);
  if(isFlipped){
    const kt=document.getElementById("krText");
    kt.classList.remove("show");
    requestAnimationFrame(()=>requestAnimationFrame(()=>kt.classList.add("show")));
  }
}

function goTo(idx){
  if(idx<0) return;
  if(idx>=pool.length){ curIdx=0; render(); return; } // loop to start
  curIdx=idx;
  render();
}

function toggleSave(){
  const gi=pool[curIdx];
  const hb=document.getElementById("heartBtn");
  if(saved.has(gi)){
    saved.delete(gi);
    hb.className="heart-btn";hb.textContent="♡";
    showToast("저장 취소");
  }else{
    saved.add(gi);
    hb.className="heart-btn loved";hb.textContent="♥";
    showToast("시를 저장했습니다 ❤");
  }
  renderSaved();
}

function renderDots(){
  const bar=document.getElementById("histBar");
  bar.innerHTML="";
  for(let i=0;i<pool.length;i++){
    const d=document.createElement("div");
    d.className="h-dot"+(i===curIdx?" cur":" visited");
    d.onclick=(e=>{e.stopPropagation();goTo(i);});
    bar.appendChild(d);
  }
}

function renderSaved(){
  const sec=document.getElementById("savedSection");
  const list=document.getElementById("savedList");
  if(saved.size===0){sec.classList.remove("show");return;}
  sec.classList.add("show");
  const arr=[...saved];
  list.innerHTML=arr.map(gi=>{
    const p=POEMS[gi];
    return `<div class="saved-item">
      <div class="saved-item-theme">${p.theme} · ${p.sub}</div>
      <div class="saved-item-text">${p.en.replace(/\n/g,"<br>")}</div>
    </div>`;
  }).join("");
}

async function copyPoem(){
  const p=POEMS[pool[curIdx]];
  const txt=`✦ DIKASI\n\n${p.en}\n\n${p.kr}\n\n— ${p.theme} / ${p.sub}\n© Kwang-ho Choi`;
  try{await navigator.clipboard.writeText(txt);showToast("클립보드에 복사됐습니다 ✓");}
  catch{showToast("복사 실패");}
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2200);
}

// init
document.getElementById("totalNum").textContent=POEMS.length;
buildPool();
render();
</script>
